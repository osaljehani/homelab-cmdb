<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}HomeLabCMDB{% endblock %}</title>
  <script>
    /* Set theme before paint to avoid a flash. Dark is the default. */
    (function () {
      try {
        var t = localStorage.getItem('cmdb-theme');
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/static/css/main.css?v={{ asset_version }}">
  <script src="/static/js/htmx.min.js" defer></script>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <input type="checkbox" id="nav-toggle" class="nav-toggle">
    <div class="nav-top">
      <a href="/" class="brand">HomeLab<span class="brand-mark">CMDB</span></a>
      <label for="nav-toggle" class="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </label>
    </div>
    <div class="nav-links">
      <a href="/" {% if active == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
      <a href="/hosts" {% if active == 'hosts' %}class="active"{% endif %}>Hosts</a>
      <a href="/containers" {% if active == 'containers' %}class="active"{% endif %}>Containers</a>
      <a href="/images" {% if active == 'images' %}class="active"{% endif %}>Images</a>
      <a href="/k8s" {% if active == 'k8s' %}class="active"{% endif %}>Kubernetes</a>
      <a href="/topology" {% if active == 'topology' %}class="active"{% endif %}>Topology</a>
      <a href="/network" {% if active == 'network' %}class="active"{% endif %}>Network</a>
      <a href="/import" {% if active == 'import' %}class="active"{% endif %}>Import</a>
      <a href="/collect" {% if active == 'collect' %}class="active"{% endif %}>Collect</a>
      <a href="/generate" {% if active == 'generate' %}class="active"{% endif %}>Generate</a>
      <form action="/search" method="get" class="global-search" autocomplete="off">
        <input type="search" name="gq" placeholder="Search…" aria-label="Search hosts, containers, images"
               hx-get="/search" hx-trigger="input changed delay:250ms, focus" hx-target="#global-search-results">
        <div id="global-search-results" class="search-dropdown"></div>
      </form>
      <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">Light</button>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    (function () {
      /* Global search dropdown: dismiss on outside click / Escape, clear with input. */
      var form = document.querySelector('.global-search');
      if (!form) return;
      var input = form.querySelector('input[name=gq]');
      var results = document.getElementById('global-search-results');
      document.addEventListener('click', function (e) {
        if (!form.contains(e.target)) results.innerHTML = '';
      });
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { results.innerHTML = ''; input.blur(); }
      });
      input.addEventListener('input', function () {
        if (!input.value.trim()) results.innerHTML = '';
      });
    })();
  </script>
  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      function label() {
        var light = document.documentElement.getAttribute('data-theme') === 'light';
        btn.textContent = light ? 'Dark' : 'Light';
      }
      label();
      btn.addEventListener('click', function () {
        var light = document.documentElement.getAttribute('data-theme') === 'light';
        if (light) {
          document.documentElement.removeAttribute('data-theme');
          try { localStorage.setItem('cmdb-theme', 'dark'); } catch (e) {}
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
          try { localStorage.setItem('cmdb-theme', 'light'); } catch (e) {}
        }
        label();
      });
    })();
  </script>
</body>
</html>
