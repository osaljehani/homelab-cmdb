<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}HomeLabCMDB{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
  <style>
    :root {
      --bg-base:         #070d16;
      --bg-nav:          #060c14;
      --bg-card:         #0e1825;
      --bg-input:        #080f1a;
      --bg-table-head:   #0b1520;
      --bg-table-hover:  #0f2035;
      --border:          #1c2f42;
      --text-primary:    #dde6f0;
      --text-secondary:  #5c7a94;
      --text-nav:        #6b8ba4;
      --text-nav-active: #e2eefa;
      --accent:          #38bdf8;
      --accent-hover:    #0ea5e9;
      --accent-dim:      rgba(56,189,248,.1);
      --danger:          #f87171;
      --danger-hover:    #ef4444;
      --badge-bg:        rgba(56,189,248,.08);
      --badge-text:      #38bdf8;
      --badge-border:    rgba(56,189,248,.2);
      --badge-red-bg:    rgba(248,113,113,.08);
      --badge-red-text:  #f87171;
      --badge-red-border:rgba(248,113,113,.2);
      --bg-pre:          #040810;
      --text-pre:        #7dd3fc;
      --stat-value:      #38bdf8;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      margin: 0;
      background: var(--bg-base);
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Nav ── */
    .nav-toggle { display: none; }

    nav {
      background: var(--bg-nav);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      min-height: 52px;
    }

    .nav-top {
      display: flex;
      align-items: center;
    }

    .brand {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: .9rem;
      color: var(--accent);
      margin-right: 2rem;
      white-space: nowrap;
      letter-spacing: -.01em;
    }

    .brand::before { content: '> '; opacity: .45; }
    .brand::after  { content: '_'; animation: blink 1.2s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      padding: .4rem;
      margin-left: auto;
    }

    .hamburger span {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--text-nav);
      border-radius: 2px;
      transition: transform .2s, opacity .2s;
    }

    .nav-links {
      display: flex;
      align-items: center;
    }

    .nav-links a {
      padding: .9rem .85rem;
      color: var(--text-nav);
      font-size: .875rem;
      font-weight: 500;
      position: relative;
      transition: color .15s;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: .85rem;
      right: .85rem;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform .15s;
      border-radius: 2px 2px 0 0;
    }

    .nav-links a:hover { color: var(--text-nav-active); }
    .nav-links a.active { color: var(--accent); }
    .nav-links a.active::after { transform: scaleX(1); }

    /* ── Layout ── */
    main {
      padding: 1.75rem 1.5rem;
      max-width: 1280px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 1.25rem;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -.02em;
    }

    h2 {
      margin: 0 0 .9rem;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    /* ── Cards ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      overflow-x: auto;
    }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; }

    th, td {
      padding: .6rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: .875rem;
    }

    th {
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text-secondary);
      background: var(--bg-table-head);
    }

    tbody tr {
      border-left: 2px solid transparent;
      transition: background .1s, border-color .1s;
    }

    tbody tr:hover {
      background: var(--bg-table-hover);
      border-left-color: var(--accent);
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: .1rem .55rem;
      border-radius: 999px;
      background: var(--badge-bg);
      color: var(--badge-text);
      border: 1px solid var(--badge-border);
      font-size: .76rem;
      font-weight: 500;
      margin: .1rem;
    }

    .badge-red {
      background: var(--badge-red-bg);
      color: var(--badge-red-text);
      border-color: var(--badge-red-border);
    }

    /* ── Forms ── */
    input[type=search],
    input[type=text],
    select {
      padding: .45rem .75rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .875rem;
      color: var(--text-primary);
      font-family: inherit;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      width: 100%;
      max-width: 360px;
    }

    input[type=search]:focus,
    input[type=text]:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56,189,248,.08);
    }

    input[type=file] {
      color: var(--text-secondary);
      font-size: .875rem;
      font-family: inherit;
      margin-bottom: .75rem;
      display: block;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      padding: .45rem 1rem;
      background: var(--accent);
      color: #04111e;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .875rem;
      font-weight: 600;
      font-family: inherit;
      white-space: nowrap;
      transition: background .15s;
    }

    .btn:hover { background: var(--accent-hover); }
    .btn-sm { padding: .28rem .65rem; font-size: .8rem; }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(248,113,113,.25);
    }

    .btn-danger:hover {
      background: rgba(248,113,113,.1);
      border-color: var(--danger);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--accent-dim);
      color: var(--text-nav-active);
      border-color: rgba(56,189,248,.3);
    }

    /* ── Stats ── */
    .stats-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      flex: 1;
      min-width: 140px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
    }

    .stat-card .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.9rem;
      font-weight: 600;
      color: var(--stat-value);
      letter-spacing: -.02em;
    }

    .stat-card .label {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-top: .35rem;
    }

    /* ── Code & Pre ── */
    code {
      font-family: 'JetBrains Mono', monospace;
      font-size: .82em;
      background: var(--bg-pre);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .1em .4em;
      color: var(--text-pre);
    }

    pre {
      background: var(--bg-pre);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: .82rem;
      line-height: 1.65;
      color: var(--text-pre);
      margin: 0;
    }

    /* ── Alerts ── */
    .flash-success {
      background: rgba(34,197,94,.07);
      border: 1px solid rgba(34,197,94,.22);
      color: #4ade80;
      padding: .8rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: .9rem;
    }

    .flash-error {
      background: rgba(248,113,113,.07);
      border: 1px solid rgba(248,113,113,.22);
      color: #f87171;
      padding: .8rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: .9rem;
    }

    .flash-success pre,
    .flash-error pre {
      background: transparent;
      border: none;
      padding: .35rem 0 0;
      color: inherit;
      opacity: .75;
    }

    /* ── Utilities ── */
    .text-muted  { color: var(--text-secondary); }
    .text-center { text-align: center; }

    .grid-2   { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3   { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; align-items: start; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .grid-2, .grid-3, .grid-2-1 { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      nav { flex-direction: column; align-items: stretch; padding: 0; min-height: auto; }

      .nav-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 52px;
        padding: 0 1rem;
      }

      .hamburger { display: flex; }

      .nav-links {
        display: none;
        flex-direction: column;
        align-items: stretch;
        border-top: 1px solid var(--border);
      }

      .nav-links a {
        padding: .85rem 1.25rem;
        border-bottom: 1px solid var(--border);
        font-size: .9rem;
      }

      .nav-links a:last-child { border-bottom: none; }
      .nav-links a::after { display: none; }

      .nav-toggle:checked ~ .nav-links { display: flex; }

      .nav-toggle:checked ~ .nav-top .hamburger span:nth-child(1) {
        transform: translateY(7px) rotate(45deg);
      }
      .nav-toggle:checked ~ .nav-top .hamburger span:nth-child(2) { opacity: 0; }
      .nav-toggle:checked ~ .nav-top .hamburger span:nth-child(3) {
        transform: translateY(-7px) rotate(-45deg);
      }

      main { padding: 1rem; }
      h1 { font-size: 1.25rem; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <input type="checkbox" id="nav-toggle" class="nav-toggle">
    <div class="nav-top">
      <span class="brand">homelab-cmdb</span>
      <label for="nav-toggle" class="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </label>
    </div>
    <div class="nav-links">
      <a href="/" {% if active == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
      <a href="/hosts" {% if active == 'hosts' %}class="active"{% endif %}>Hosts</a>
      <a href="/k8s" {% if active == 'k8s' %}class="active"{% endif %}>Kubernetes</a>
      <a href="/import" {% if active == 'import' %}class="active"{% endif %}>Import</a>
      <a href="/generate" {% if active == 'generate' %}class="active"{% endif %}>Generate</a>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
