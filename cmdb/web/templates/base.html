<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}HomeLabCMDB{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
  <style>
    :root {
      /* ── Graphite palette (matches Portfolio) ── */
      --bg-base:         #121212;
      --bg-nav:          #151515;
      --bg-card:         #1a1a1a;
      --bg-input:        #1a1a1a;
      --surface:         #1a1a1a;
      --bg-table-head:   #151515;
      --bg-table-hover:  #1a1a1a;
      --border:          #2a2a2a;
      --border-hover:    #4a4a4a;
      --text-primary:    #f2f2f2;
      --text-secondary:  #b0b0b0;
      --text-muted:      #7a7a7a;
      --text-nav:        #7a7a7a;
      --text-nav-active: #f2f2f2;
      /* Single restrained accent   used ONLY for active nav, brand, stat values */
      --accent:          #7d9bb8;
      --accent-hover:    #93acc4;
      --accent-dim:      rgba(125,155,184,.12);
      --danger:          #ef4444;
      --danger-hover:    #f87171;
      --badge-bg:        transparent;
      --badge-text:      #b0b0b0;
      --badge-border:    #2a2a2a;
      --badge-red-bg:    transparent;
      --badge-red-text:  #ef4444;
      --badge-red-border:rgba(239,68,68,.4);
      --bg-pre:          #0d0d0d;
      --text-pre:        #b0b0b0;
      --stat-value:      #7d9bb8;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      background: var(--bg-base);
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    ::selection { background: var(--text-primary); color: var(--bg-base); }

    /* ── Nav ── */
    .nav-toggle { display: none; }

    nav {
      background: var(--bg-nav);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      min-height: 52px;
    }

    .nav-top {
      display: flex;
      align-items: center;
    }

    .brand {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: .9rem;
      color: var(--accent);
      margin-right: 2rem;
      white-space: nowrap;
      letter-spacing: -.01em;
    }

    .brand::before { content: '> '; opacity: .45; }
    .brand::after  { content: '_'; animation: blink 1.2s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      padding: .4rem;
      margin-left: auto;
    }

    .hamburger span {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--text-nav);
      transition: transform .2s, opacity .2s;
    }

    .nav-links {
      display: flex;
      align-items: center;
    }

    .nav-links a {
      padding: .9rem .85rem;
      color: var(--text-nav);
      font-family: 'JetBrains Mono', monospace;
      font-size: .8rem;
      font-weight: 500;
      position: relative;
      transition: color .15s;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: .85rem;
      right: .85rem;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform .15s;
    }

    .nav-links a:hover { color: var(--text-nav-active); }
    .nav-links a.active { color: var(--accent); }
    .nav-links a.active::after { transform: scaleX(1); }

    /* ── Layout ── */
    main {
      padding: 1.75rem 1.5rem;
      max-width: 1280px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 1.25rem;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -.02em;
      color: var(--text-primary);
    }

    /* Terminal-style marker on page headings (Portfolio "$ whoami" idiom) */
    h1::before {
      content: '$ ';
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      font-weight: 500;
    }

    h2 {
      margin: 0 0 .9rem;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Cards ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 1.5rem;
      margin-bottom: 1rem;
      overflow-x: auto;
    }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; }

    th, td {
      padding: .6rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: .875rem;
    }

    th {
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--bg-table-head);
    }

    tbody tr {
      border-left: 2px solid transparent;
      transition: background .1s, border-color .1s;
    }

    tbody tr:hover {
      background: var(--bg-table-hover);
      border-left-color: var(--accent);
    }

    /* ── Badges / tags ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: .12rem .55rem;
      background: var(--badge-bg);
      color: var(--badge-text);
      border: 1px solid var(--badge-border);
      font-family: 'JetBrains Mono', monospace;
      font-size: .74rem;
      font-weight: 500;
      margin: .1rem;
      transition: border-color .15s, color .15s;
    }

    .badge:hover { border-color: var(--border-hover); }

    .badge-red {
      background: var(--badge-red-bg);
      color: var(--badge-red-text);
      border-color: var(--badge-red-border);
    }

    /* ── Forms ── */
    input[type=search],
    input[type=text],
    select {
      padding: .45rem .75rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      font-size: .875rem;
      color: var(--text-primary);
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
      width: 100%;
      max-width: 360px;
    }

    input[type=search]::placeholder,
    input[type=text]::placeholder { color: #6a6a6a; }

    input[type=search]:focus,
    input[type=text]:focus,
    select:focus { border-color: var(--border-hover); }

    input[type=file] {
      color: var(--text-secondary);
      font-size: .875rem;
      font-family: inherit;
      margin-bottom: .75rem;
      display: block;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      padding: .45rem 1rem;
      background: var(--text-primary);
      color: var(--bg-base);
      border: 1px solid var(--text-primary);
      cursor: pointer;
      font-size: .875rem;
      font-weight: 600;
      font-family: inherit;
      white-space: nowrap;
      transition: background .15s, border-color .15s, color .15s;
    }

    .btn:hover { background: #d6d6d6; border-color: #d6d6d6; }
    .btn-sm { padding: .28rem .65rem; font-size: .8rem; }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--badge-red-border);
    }

    .btn-danger:hover {
      background: rgba(239,68,68,.1);
      border-color: var(--danger);
      color: var(--danger);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: transparent;
      color: var(--text-primary);
      border-color: var(--border-hover);
    }

    /* ── Stats ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--bg-base);
      padding: 1.25rem 1.5rem;
      transition: background .15s;
    }

    .stat-card:hover { background: var(--surface); }

    .stat-card .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--stat-value);
      letter-spacing: -.02em;
    }

    .stat-card .label {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: .35rem;
    }

    /* ── Code & Pre ── */
    code {
      font-family: 'JetBrains Mono', monospace;
      font-size: .82em;
      background: var(--bg-pre);
      border: 1px solid var(--border);
      padding: .1em .4em;
      color: var(--text-pre);
    }

    pre {
      background: var(--bg-pre);
      border: 1px solid var(--border);
      padding: 1rem;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: .82rem;
      line-height: 1.65;
      color: var(--text-pre);
      margin: 0;
    }

    /* ── Alerts ── */
    .flash-success {
      background: rgba(122,160,122,.07);
      border: 1px solid rgba(122,160,122,.3);
      color: #8fbf8f;
      padding: .8rem 1rem;
      margin-bottom: 1rem;
      font-size: .9rem;
    }

    .flash-error {
      background: rgba(239,68,68,.07);
      border: 1px solid var(--badge-red-border);
      color: var(--danger);
      padding: .8rem 1rem;
      margin-bottom: 1rem;
      font-size: .9rem;
    }

    .flash-success pre,
    .flash-error pre {
      background: transparent;
      border: none;
      padding: .35rem 0 0;
      color: inherit;
      opacity: .8;
    }

    /* ── Timeline (change history) ── */
    .timeline {
      list-style: none;
      margin: 0;
      padding: 0 0 0 1.5rem;
      border-left: 1px solid var(--border);
    }

    .timeline-item {
      position: relative;
      padding-bottom: 1.25rem;
    }

    .timeline-item:last-child { padding-bottom: 0; }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: calc(-1.5rem - 4px);
      top: .35rem;
      width: 7px;
      height: 7px;
      background: var(--bg-card);
      border: 1px solid var(--text-muted);
    }

    .timeline-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: .75rem;
      color: var(--text-muted);
      margin-bottom: .4rem;
    }

    .diff-row {
      font-family: 'JetBrains Mono', monospace;
      font-size: .8rem;
      line-height: 1.7;
    }

    .diff-row::before { content: '> '; color: var(--text-muted); }
    .diff-field { color: var(--text-secondary); }
    .diff-old { color: var(--danger); }
    .diff-new { color: var(--accent); }

    /* ── Utilities ── */
    .text-muted  { color: var(--text-muted); }
    .text-center { text-align: center; }

    .grid-2   { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3   { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; align-items: start; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .grid-2, .grid-3, .grid-2-1 { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      nav { flex-direction: column; align-items: stretch; padding: 0; min-height: auto; }

      .nav-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 52px;
        padding: 0 1rem;
      }

      .hamburger { display: flex; }

      .nav-links {
        display: none;
        flex-direction: column;
        align-items: stretch;
        border-top: 1px solid var(--border);
      }

      .nav-links a {
        padding: .85rem 1.25rem;
        border-bottom: 1px solid var(--border);
        font-size: .9rem;
      }

      .nav-links a:last-child { border-bottom: none; }
      .nav-links a::after { display: none; }

      .nav-toggle:checked ~ .nav-links { display: flex; }

      .nav-toggle:checked ~ .nav-top .hamburger span:nth-child(1) {
        transform: translateY(7px) rotate(45deg);
      }
      .nav-toggle:checked ~ .nav-top .hamburger span:nth-child(2) { opacity: 0; }
      .nav-toggle:checked ~ .nav-top .hamburger span:nth-child(3) {
        transform: translateY(-7px) rotate(-45deg);
      }

      main { padding: 1rem; }
      h1 { font-size: 1.25rem; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <input type="checkbox" id="nav-toggle" class="nav-toggle">
    <div class="nav-top">
      <span class="brand">homelab-cmdb</span>
      <label for="nav-toggle" class="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </label>
    </div>
    <div class="nav-links">
      <a href="/" {% if active == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
      <a href="/hosts" {% if active == 'hosts' %}class="active"{% endif %}>Hosts</a>
      <a href="/containers" {% if active == 'containers' %}class="active"{% endif %}>Containers</a>
      <a href="/k8s" {% if active == 'k8s' %}class="active"{% endif %}>Kubernetes</a>
      <a href="/import" {% if active == 'import' %}class="active"{% endif %}>Import</a>
      <a href="/generate" {% if active == 'generate' %}class="active"{% endif %}>Generate</a>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
