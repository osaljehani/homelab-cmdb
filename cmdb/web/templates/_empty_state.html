{% macro empty_state(title, hint, cta_label=none, cta_url=none) %}
<div class="empty-state">
  <div class="empty-state-glyph">∅</div>
  <div class="empty-state-title">{{ title }}</div>
  <p class="empty-state-hint">{{ hint }}</p>
  {% if cta_label and cta_url %}<a href="{{ cta_url }}" class="btn btn-sm">{{ cta_label }}</a>{% endif %}
</div>
{% endmacro %}
